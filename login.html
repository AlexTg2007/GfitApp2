<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - GfitApp</title>

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5; /* opcional */
        }

        main {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>

<main>

    <section class="section-block section-light">

        <div class="burbuja form-max" style="width:100%;">

            <h1 class="titulo">Iniciar sesión</h1>
            <p class="subtitulo">Accede a tu cuenta</p>

            <form method="POST" action="/login">

                <p>Usuario</p>
                <input type="text" name="username" required>

                <p>Contraseña</p>
                <input type="password" name="password" required>

                <button class="btn-dark" type="submit">
                    Entrar
                </button>

            </form>

            <br>

            <a class="link-negro" href="/register">
                ¿No tienes cuenta? Regístrate
            </a>

        </div>

    </section>

</main>

</body>
</html>
